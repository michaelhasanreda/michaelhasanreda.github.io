<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <title>Michael Reda, oil painter</title>
    <meta charset="UTF-8">
    <meta name="description" content="Michael Reda is a British oil painter working in York.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://michaelreda.uk/w3_stylesheet.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
    <style>
      body,h1,h2,h3,h4,h5 {font-family: "Raleway", sans-serif}
      .w3-third img{margin-bottom: -6px; opacity: 0.8; cursor: pointer}
      .w3-third img:hover{opacity: 1}
    </style>
  </head>

<body class="w3-light-grey w3-content" style="max-width:1600px">

  <!-- Sidebar/menu -->
  <nav class="w3-sidebar w3-bar-block w3-white w3-animate-left w3-text-grey w3-collapse w3-top w3-center" style="z-index:3;width:300px;font-weight:bold" id="mySidebar"><br>
    <h2 class="w3-padding-64 w3-center"><b>MICHAEL<br>REDA/b></h2>
    <a href="javascript:void(0)" onclick="w3_close()" class="w3-bar-item w3-button w3-padding w3-hide-large">[close]</a>
    <a href="#" onclick="w3_close()" class="w3-bar-item w3-button">PORTFOLIO</a> 
    <a href="#about" onclick="w3_close()" class="w3-bar-item w3-button">ABOUT ME</a> 
    <a href="#contact" onclick="w3_close()" class="w3-bar-item w3-button">CONTACT</a>
  </nav>
  
  <!-- Top menu on small screens -->
  <header class="w3-container w3-top w3-hide-large w3-white w3-xlarge w3-padding-16">
    <span class="w3-left w3-padding">MICHAEL REDA</span>
    <a href="javascript:void(0)" class="w3-right w3-button w3-white" onclick="w3_open()">☰</a>
  </header>
  
  <!-- Overlay effect when opening sidebar on small screens -->
  <div class="w3-overlay w3-hide-large w3-animate-opacity" onclick="w3_close()" style="cursor:pointer" title="close side menu" id="myOverlay"></div>
  
  <!-- !PAGE CONTENT! -->
  <div class="w3-main" style="margin-left:300px">
  
    <!-- Push down content on small screens --> 
    <div class="w3-hide-large" style="margin-top:83px"></div>
    
    <!-- Photo grid -->
    <div class="w3-row">
      <div class="w3-third">
        <img src="test_img_1.png" style="width:100%" onclick="onClick(this)" alt="Test Image 1">
        <img src="test_img_2.png" style="width:100%" onclick="onClick(this)" alt="Test Image 2">
        <img src="test_img_3.png" style="width:100%" onclick="onClick(this)" alt="Test Image 3">
      </div>
  
      <div class="w3-third">
        <img src="test_img_4.png" style="width:100%" onclick="onClick(this)" alt="Test Image 4">
      </div>
      
    <!-- Pagination -->
    <div class="w3-center w3-padding-32">
      <div class="w3-bar">
        <a href="#" class="w3-bar-item w3-button w3-hover-black">«</a>
        <a href="#" class="w3-bar-item w3-black w3-button">1</a>
        <a href="#" class="w3-bar-item w3-button w3-hover-black">2</a>
        <a href="#" class="w3-bar-item w3-button w3-hover-black">3</a>
        <a href="#" class="w3-bar-item w3-button w3-hover-black">4</a>
        <a href="#" class="w3-bar-item w3-button w3-hover-black">»</a>
      </div>
    </div>
    
    <!-- Modal for full size images on click-->
    <div id="modal01" class="w3-modal w3-black" style="padding-top:0" onclick="this.style.display='none'">
      <span class="w3-button w3-black w3-xlarge w3-display-topright">×</span>
      <div class="w3-modal-content w3-animate-zoom w3-center w3-transparent w3-padding-64">
        <img id="img01" class="w3-image">
        <p id="caption"></p>
      </div>
    </div>
  
    <!-- About section -->
    <div class="w3-container w3-dark-grey w3-center w3-text-light-grey w3-padding-32" id="about">
      <h4><b>About Me</b></h4>
      <img src="test_img_1.png" alt="About Me" class="w3-image w3-padding-32" width="600" height="650">
      <div class="w3-content w3-justify" style="max-width:600px">
        <h4>Michael Reda</h4>
        <p>I am an oil painter based in York.
        </p>
        <p>mail: my.email@address</p>
        <hr class="w3-opacity">
       
         
    <!-- Footer -->
    <footer class="w3-container w3-padding-32 w3-grey">  
      <div class="w3-row-padding">
        <div class="w3-third">
          <h3>Information</h3>
          <p>Am I so out of touch? No, it's the children who are wrong.</p>      
        </div>
        
  <!-- End page content -->
  </div>
  
  <script>
    // Script to open and close sidebar
    function w3_open() {
      document.getElementById("mySidebar").style.display = "block";
      document.getElementById("myOverlay").style.display = "block";
    }
     
    function w3_close() {
      document.getElementById("mySidebar").style.display = "none";
      document.getElementById("myOverlay").style.display = "none";
    }
    
    // Modal Image Gallery
    function onClick(element) {
      document.getElementById("img01").src = element.src;
      document.getElementById("modal01").style.display = "block";
      var captionText = document.getElementById("caption");
      captionText.innerHTML = element.alt;
    }
  </script>


</body>
</html>
